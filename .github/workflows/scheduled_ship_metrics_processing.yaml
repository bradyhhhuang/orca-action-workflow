name: Scheduled Ship Metrics Processing

on:
  schedule:
    - cron: "30 3 * * 1"   # every Sunday at 15:30 (UTC)
  workflow_dispatch:

jobs:
  process-s3-data:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false

    permissions:
      contents: write      # REQUIRED to commit back to repo
      id-token: write      # REQUIRED for AWS OIDC
      actions: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      M2_token: ${{ secrets.M2_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to commit changes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: requirements_pipeline.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_pipeline.txt
          pip install s3fs
      
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install ffmpeg
      
      - name: Configure AWS
        run: aws sts get-caller-identity
      
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ffmpeg

      - name: Process S3 data
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          python ambient-sound-analysis_scripts/git_action_ship_metrics_upload.py

